  <link rel="stylesheet" href="style.css">

  <!-- TEMPORARY TEST STYLE: Force native checkbox to show on deployed site -->
  <style>
    .consent-box input[type="checkbox"] {
      opacity: 1 !important;
      position: static !important;
      width: 16px !important;   /* or auto */
      height: 16px !important;
      margin: 0 8px 0 0 !important;  /* space between box and text */
      vertical-align: middle !important;
      accent-color: #04386A;    /* matches your brand color from the page */
      display: inline-block !important;
      appearance: auto !important;   /* reset any none/erase */
    }

    /* Hide any fake/decorative checkbox that might be covering it */
    .consent-box span::before,
    .consent-box span::after,
    .consent-box label::before,
    .consent-box label::after {
      display: none !important;
    }

    /* Ensure the whole label is clickable and visible */
    .consent-box {
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      margin: 16px 0 !important;
      cursor: pointer !important;
    }
  </style>
</head>

  <!-- CONTENT -->
  <div class="container">
    <h2 class="section-title">Contact</h2>
    <p class="section-intro">
      We welcome inquiries regarding partnerships, collaborations, and project opportunities.
    </p>
    <form class="contact-form" action="send-message.php" method="POST">
      <input type="text" name="name" placeholder="Ihr Name" required>
      <input type="email" name="email" placeholder="E-Mail-Adresse" required>
      <textarea name="message" rows="5" placeholder="Ihre Nachricht" required></textarea>
      <label class="consent-box">
        <input type="checkbox" name="consent" value="yes" required>
        <span>
          Ich stimme der Verarbeitung meiner Daten gemäß der
          <a href="privacy.html">Datenschutzerklärung</a> zu.
        </span>
      </label>
      <button type="submit">Absenden</button>
    </form>
    <p class="section-intro">
      <strong>RenewPoly GmbH</strong><br>
      Lichtenbergstr. 4, 85748 Garching, Germany<br>
      Email: <a href="mailto:info@renewpoly.com" style="color:#04386A;">info@renewpoly.com</a><br>
      Phone: +49 176 7417 2736
    </p>
