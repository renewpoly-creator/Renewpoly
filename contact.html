<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | RenewPoly</title>
 
  <link rel="stylesheet" href="style.css">

  <!-- TEMPORARY TEST STYLE: Force native checkbox to show on deployed site -->
  <!-- STRONGER TEMP TEST STYLE: Make checkbox super obvious -->
<style>
  .consent-box input[type="checkbox"] {
    opacity: 1 !important;
    visibility: visible !important;
    display: inline-block !important;
    position: static !important;
    width: 24px !important;
    height: 24px !important;
    min-width: 24px !important;
    min-height: 24px !important;
    margin: 0 12px 0 0 !important;
    border: 3px solid red !important;          /* bright red border to spot it */
    background-color: white !important;
    accent-color: #ff0000 !important;          /* red check when ticked */
    appearance: auto !important;
    box-shadow: 0 0 10px red !important;       /* glow if still hidden */
  }

  /* Nuke any possible hiding pseudo-elements or overrides */
  .consent-box *::before,
  .consent-box *::after,
  input[type="checkbox"]::before,
  input[type="checkbox"]::after {
    display: none !important;
    content: none !important;
  }

  .consent-box {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
    margin: 20px 0 !important;
    min-height: 30px !important;
    border: 1px dashed orange !important;     /* orange outline around whole label for debugging */
  }
</style>
</head>
<body>
  <!-- NAVIGATION -->
  <nav>
    <div class="nav-container">
      <div class="logo">
        <a href="index.html">
          <img src="logo2.png" alt="RenewPoly Logo">
        </a>
      </div>
      <div class="nav-links">
        <a href="index.html#home">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#products">Products</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#team">Team</a>
        <a href="contact.html">Contact</a>
        <a href="imprint.html">Imprint</a>
        <a href="privacy.html">Privacy</a>
      </div>
    </div>
  </nav>
  <!-- CONTENT -->
  <div class="container">
    <h2 class="section-title">Contact</h2>
    <p class="section-intro">
      We welcome inquiries regarding partnerships, collaborations, and project opportunities.
    </p>
    <form class="contact-form" action="https://formspree.io/f/xqeydoww" method="POST"> 
      <input type="text" name="name" placeholder="Ihr Name" required>
      <input type="email" name="email" placeholder="E-Mail-Adresse" required>
      <textarea name="message" rows="5" placeholder="Ihre Nachricht" required></textarea>
      <label class="consent-box">
        <input type="checkbox" name="consent" value="yes" required>
        <span>
          Ich stimme der Verarbeitung meiner Daten gemäß der
          <a href="privacy.html">Datenschutzerklärung</a> zu.
        </span>
      </label>
      <button type="submit">Absenden</button>
    </form>
    <p class="section-intro">
      <strong>RenewPoly GmbH</strong><br>
      Lichtenbergstr. 4, 85748 Garching, Germany<br>
      Email: <a href="mailto:info@renewpoly.com" style="color:#04386A;">info@renewpoly.com</a><br>
      Phone: +49 176 7417 2736
    </p>
  </div>
  <!-- FOOTER -->
  <footer>
    <a href="contact.html">Contact</a>
    <a href="imprint.html">Imprint</a>
    <a href="privacy.html">Privacy Notice</a>
  </footer>
</body>
</html>
